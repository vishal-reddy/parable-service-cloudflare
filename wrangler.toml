#:schema node_modules/wrangler/config-schema.json
name = "parable-service-cloudflare"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = "./public" }

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "parable-db"
database_id = "local"  # replaced after `wrangler d1 create`

[vars]
ENVIRONMENT = "development"
