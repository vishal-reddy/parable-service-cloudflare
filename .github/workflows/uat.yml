name: UAT Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: uat-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  deploy-uat:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Create or reuse UAT D1 database
        id: d1
        run: |
          DB_NAME="parable-uat-pr-${PR_NUMBER}"

          # Check if database already exists
          EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?name=${DB_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          DB_ID=$(echo "$EXISTING" | jq -r '.result[0].uuid // empty')

          if [ -n "$DB_ID" ]; then
            echo "Reusing existing D1 database: ${DB_ID}"
          else
            echo "Creating new D1 database: ${DB_NAME}"
            RESPONSE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${DB_NAME}\"}")

            DB_ID=$(echo "$RESPONSE" | jq -r '.result.uuid // empty')
            if [ -z "$DB_ID" ]; then
              echo "::error::Failed to create D1 database"
              echo "$RESPONSE" | jq .
              exit 1
            fi
            echo "Created D1 database: ${DB_ID}"
          fi

          echo "db_id=${DB_ID}" >> "$GITHUB_OUTPUT"
          echo "db_name=${DB_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate UAT wrangler.toml
        run: |
          DB_NAME="parable-uat-pr-${PR_NUMBER}"
          DB_ID="${{ steps.d1.outputs.db_id }}"

          sed -i \
            -e 's/^name = .*/name = "'"${DB_NAME}"'"/' \
            -e 's/^database_name = .*/database_name = "'"${DB_NAME}"'"/' \
            -e 's/^database_id = .*/database_id = "'"${DB_ID}"'"/' \
            -e '/^routes = \[/,/^\]/d' \
            -e 's/^ENVIRONMENT = .*/ENVIRONMENT = "uat"/' \
            wrangler.toml

          echo "--- UAT wrangler.toml ---"
          cat wrangler.toml

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "parable-uat-pr-${PR_NUMBER}" --remote

      - name: Seed UAT database
        run: npx wrangler d1 execute "parable-uat-pr-${PR_NUMBER}" --remote --file=scripts/seed.sql

      - name: Build CSS
        run: npm run css:build

      - name: Deploy UAT worker
        run: npx wrangler deploy

      - name: Comment UAT URL on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- uat-deploy -->
            ## 🚀 UAT Environment Deployed

            | Resource | URL |
            |----------|-----|
            | **UAT App** | https://parable-uat-pr-${{ github.event.pull_request.number }}.sapiagent-proxy.workers.dev |
            | **Health Check** | https://parable-uat-pr-${{ github.event.pull_request.number }}.sapiagent-proxy.workers.dev/health |

            _Last deployed: ${{ github.sha }} · [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          edit-mode: replace

  cleanup-uat:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Delete UAT worker
        run: |
          WORKER_NAME="parable-uat-pr-${PR_NUMBER}"
          echo "Deleting worker: ${WORKER_NAME}"
          RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$RESPONSE" | jq .

      - name: Delete UAT D1 database
        run: |
          DB_NAME="parable-uat-pr-${PR_NUMBER}"

          # Look up the database ID by name
          EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?name=${DB_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          DB_ID=$(echo "$EXISTING" | jq -r '.result[0].uuid // empty')

          if [ -z "$DB_ID" ]; then
            echo "D1 database ${DB_NAME} not found — may have already been deleted"
            exit 0
          fi

          echo "Deleting D1 database: ${DB_NAME} (${DB_ID})"
          RESPONSE=$(curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DB_ID}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$RESPONSE" | jq .

      - name: Comment cleanup on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- uat-deploy -->
            ## 🧹 UAT Environment Cleaned Up

            The UAT worker and D1 database for this PR have been deleted.

            _Cleaned up by: [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          edit-mode: replace
